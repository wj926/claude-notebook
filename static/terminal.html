<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Terminal - Workspace Viewer</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #ffffff;
            --sidebar-bg: #f7f6f3;
            --sidebar-hover: #eeece8;
            --sidebar-active: #e8e5e0;
            --text: #37352f;
            --text-secondary: #9b9a97;
            --border: #e8e5e0;
            --accent: #2eaadc;
            --danger: #e03e3e;
            --danger-hover: #c53030;
            --success: #0f7b6c;
        }
        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans', sans-serif;
            font-size: 16px;
            color: var(--text);
            background: var(--bg);
            overflow: hidden;
        }

        /* Layout */
        .layout {
            display: flex;
            height: 100vh;
            height: 100dvh;
        }

        /* Sidebar */
        .term-sidebar {
            width: 240px;
            min-width: 200px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .term-sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .term-sidebar-header h2 {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
        }
        .header-actions {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .btn-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            background: none;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.15s;
            font-size: 16px;
        }
        .btn-icon:hover {
            background: var(--text);
            color: #fff;
            border-color: var(--text);
        }
        .btn-icon.back-btn {
            font-size: 14px;
        }
        .btn-icon.new-btn {
            font-size: 18px;
            font-weight: 300;
        }

        /* Terminal list */
        .term-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }
        .term-item {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            margin: 2px 8px;
            cursor: pointer;
            font-size: 14px;
            border-radius: 6px;
            transition: background 0.1s;
            gap: 8px;
        }
        .term-item:hover {
            background: var(--sidebar-hover);
        }
        .term-item.active {
            background: var(--sidebar-active);
            font-weight: 500;
        }
        .term-item-icon {
            flex-shrink: 0;
            width: 20px;
            text-align: center;
            color: var(--text-secondary);
        }
        .term-item-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .term-item-name[contenteditable="true"] {
            outline: none;
            background: #fff;
            border: 1px solid var(--accent);
            border-radius: 3px;
            padding: 1px 4px;
            margin: -1px -4px;
            min-width: 40px;
        }
        .term-item-time {
            font-size: 11px;
            color: var(--text-secondary);
            flex-shrink: 0;
        }
        .term-item-close {
            flex-shrink: 0;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid transparent;
            background: none;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 4px;
            font-size: 13px;
            opacity: 0.6;
            transition: all 0.1s;
        }
        .term-item-close:hover {
            opacity: 1;
            background: var(--danger);
            color: #fff;
            border-color: var(--danger);
        }
        .term-empty {
            padding: 24px 16px;
            text-align: center;
            color: var(--text-secondary);
            font-size: 13px;
            line-height: 1.6;
        }

        /* Main terminal area */
        .term-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #1e1e1e;
            position: relative;
            min-width: 0;
            min-height: 0;
        }
        .term-toolbar {
            display: flex;
            align-items: center;
            padding: 6px 12px;
            background: #2d2d2d;
            border-bottom: 1px solid #404040;
            gap: 8px;
            min-height: 36px;
            flex-shrink: 0;
        }
        .term-toolbar-title {
            font-size: 12px;
            color: #ccc;
            font-family: 'SFMono-Regular', 'Fira Code', 'Consolas', monospace;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            min-width: 0;
        }
        .term-toolbar-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            flex-shrink: 0;
        }
        .term-toolbar-dot.disconnected {
            background: var(--danger);
        }
        .term-toolbar-spacer { flex: 1; }
        .term-toolbar-btn {
            background: none;
            border: 1px solid #555;
            color: #ccc;
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s;
            flex-shrink: 0;
            white-space: nowrap;
        }
        .term-toolbar-btn:hover {
            background: #555;
            color: #fff;
        }

        /* Terminal + scrollbar wrapper */
        .term-body {
            flex: 1;
            min-height: 0;
            position: relative;
            display: flex;
        }
        #terminalContainer {
            flex: 1;
            overflow: hidden;
            min-width: 0;
        }
        #terminalContainer .xterm {
            height: 100%;
        }
        #terminalContainer .xterm-viewport {
            overflow-y: scroll !important;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        #terminalContainer .xterm-viewport::-webkit-scrollbar {
            width: 0;
            display: none;
        }
        #terminalContainer .xterm-screen {
            touch-action: pan-y;
        }

        /* Custom scrollbar — fixed-width column next to terminal */
        .custom-scrollbar {
            width: 14px;
            flex-shrink: 0;
            background: #252525;
            border-left: 1px solid #404040;
            position: relative;
            display: none;
        }
        .custom-scrollbar.active {
            display: block;
        }
        .custom-scrollbar-track {
            position: absolute;
            top: 4px;
            bottom: 4px;
            left: 2px;
            right: 2px;
            background: #333;
            border-radius: 5px;
        }
        .custom-scrollbar-thumb {
            position: absolute;
            left: 2px;
            right: 2px;
            min-height: 40px;
            background: #888;
            border-radius: 5px;
            cursor: pointer;
            touch-action: none;
            transition: background 0.1s;
        }
        .custom-scrollbar-thumb:hover,
        .custom-scrollbar-thumb.dragging {
            background: #bbb;
        }

        /* Input bar */
        .term-input-bar {
            display: flex;
            align-items: flex-end;
            padding: 8px 10px;
            background: #2d2d2d;
            border-top: 1px solid #404040;
            gap: 6px;
            flex-shrink: 0;
            min-height: 44px;
        }
        .term-input-bar.hidden {
            display: none !important;
        }
        .term-input-field {
            flex: 1;
            background: #1e1e1e;
            border: 1px solid #555;
            border-radius: 6px;
            color: #d4d4d4;
            font-family: 'SFMono-Regular', 'Fira Code', 'Consolas', monospace;
            font-size: 14px;
            padding: 8px 12px;
            outline: none;
            resize: none;
            max-height: 120px;
            line-height: 1.4;
            overflow-y: auto;
        }
        .term-input-field:focus {
            border-color: var(--accent);
        }
        .term-input-send {
            background: var(--accent);
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 13px;
            font-weight: 500;
            padding: 8px 14px;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.15s;
            align-self: flex-end;
        }
        .term-input-send:hover {
            background: #258fb5;
        }
        .term-input-send:active {
            background: #1d7a9e;
        }
        .term-placeholder {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 14px;
            text-align: center;
            padding: 20px;
            line-height: 1.6;
        }

        /* Config modal */
        .config-modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .config-modal-overlay.active {
            display: flex;
        }
        .config-modal {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        .config-modal h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text);
        }
        .config-modal label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        .config-modal input,
        .config-modal textarea {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s;
            box-sizing: border-box;
        }
        .config-modal input:focus,
        .config-modal textarea:focus {
            border-color: var(--accent);
        }
        .config-modal textarea {
            font-family: 'SFMono-Regular', 'Fira Code', 'Consolas', monospace;
            font-size: 13px;
            resize: vertical;
            min-height: 60px;
            max-height: 160px;
            line-height: 1.5;
        }
        .config-modal .field-group {
            margin-bottom: 16px;
        }
        .config-modal .field-hint {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        .config-modal-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        .config-modal-actions button {
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
        }
        .modal-btn-cancel {
            background: none;
            border: 1px solid var(--border);
            color: var(--text);
        }
        .modal-btn-cancel:hover {
            background: var(--sidebar-hover);
        }
        .modal-btn-confirm {
            background: var(--accent);
            border: none;
            color: #fff;
        }
        .modal-btn-confirm:hover {
            background: #258fb5;
        }

        /* iMessage chat view */
        .chat-view {
            display: none;
            flex: 1;
            flex-direction: column;
            min-height: 0;
        }
        .chat-view.active {
            display: flex;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: #1e1e1e;
            -webkit-overflow-scrolling: touch;
        }
        .chat-bubble {
            max-width: 85%;
            padding: 8px 14px;
            border-radius: 18px;
            font-family: 'SFMono-Regular', 'Fira Code', 'Consolas', monospace;
            font-size: 13px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
            overflow-x: auto;
        }
        .chat-bubble.stdin {
            align-self: flex-end;
            background: #007aff;
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .chat-bubble.stdout {
            align-self: flex-start;
            background: #3a3a3c;
            color: #d4d4d4;
            border-bottom-left-radius: 4px;
        }
        .chat-bubble .chat-time {
            font-size: 10px;
            opacity: 0.5;
            margin-top: 4px;
            display: block;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }
        .chat-toggle-btn {
            background: none;
            border: 1px solid #555;
            color: #ccc;
            font-size: 14px;
            width: 28px;
            height: 24px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .chat-toggle-btn:hover {
            background: #555;
            color: #fff;
        }
        .chat-toggle-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        /* Mobile sidebar toggle */
        .mobile-toggle {
            display: none;
            position: fixed;
            top: 6px;
            left: 6px;
            z-index: 1001;
            width: 36px;
            height: 36px;
            background: rgba(45,45,45,0.9);
            border: 1px solid #555;
            border-radius: 8px;
            color: #ccc;
            font-size: 18px;
            cursor: pointer;
            align-items: center;
            justify-content: center;
        }
        .mobile-overlay {
            display: none;
        }

        /* Mobile */
        @media (max-width: 768px) {
            .mobile-toggle {
                display: flex;
            }
            .term-sidebar {
                position: fixed;
                top: 0; left: 0; bottom: 0;
                z-index: 1000;
                width: 280px;
                transform: translateX(-100%);
                transition: transform 0.25s ease;
                box-shadow: none;
            }
            .term-sidebar.open {
                transform: translateX(0);
                box-shadow: 4px 0 16px rgba(0,0,0,0.15);
            }
            .mobile-overlay.active {
                display: block;
                position: fixed;
                top: 0; left: 0; right: 0; bottom: 0;
                z-index: 999;
                background: rgba(0,0,0,0.4);
            }
            .term-sidebar-header {
                padding-left: 52px;
            }
            .term-toolbar {
                padding-left: 48px;
            }
            .term-input-bar {
                padding-bottom: max(8px, env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>
    <!-- Config Modal -->
    <div class="config-modal-overlay" id="configModalOverlay">
        <div class="config-modal">
            <h3 id="configModalTitle">New Terminal</h3>
            <div class="field-group">
                <label for="configNameInput">Terminal Name</label>
                <input type="text" id="configNameInput" placeholder="Leave empty for temporary terminal">
            </div>
            <div class="field-group">
                <label for="configCmdInput">Startup Command</label>
                <textarea id="configCmdInput" rows="3" placeholder="Enter commands (one per line, 3s interval)"></textarea>
                <div class="field-hint">Each line runs as a separate command with 3 second intervals.</div>
            </div>
            <div class="config-modal-actions">
                <button class="modal-btn-cancel" id="configCancelBtn">Cancel</button>
                <button class="modal-btn-confirm" id="configConfirmBtn">Create</button>
            </div>
        </div>
    </div>

    <div class="layout">
        <button class="mobile-toggle" id="mobileToggle">&#9776;</button>
        <div class="mobile-overlay" id="mobileOverlay"></div>

        <aside class="term-sidebar" id="termSidebar">
            <div class="term-sidebar-header">
                <h2>Terminals</h2>
                <div class="header-actions">
                    <button class="btn-icon new-btn" id="newTermBtn" title="New Terminal">+</button>
                    <button class="btn-icon back-btn" id="backBtn" title="Back to Workspace Viewer">
                        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M11.354 1.646a.5.5 0 0 1 0 .708L5.707 8l5.647 5.646a.5.5 0 0 1-.708.708l-6-6a.5.5 0 0 1 0-.708l6-6a.5.5 0 0 1 .708 0z"/></svg>
                    </button>
                </div>
            </div>
            <div class="term-list" id="termList">
                <div class="term-empty">Loading terminals...</div>
            </div>
        </aside>

        <div class="term-main" id="termMain">
            <div class="term-placeholder" id="termPlaceholder">
                Select a terminal from the sidebar<br>or create a new one with <strong>+</strong>
            </div>
            <div class="term-toolbar" id="termToolbar" style="display:none;">
                <div class="term-toolbar-dot" id="statusDot"></div>
                <span class="term-toolbar-title" id="termTitle"></span>
                <div class="term-toolbar-spacer"></div>
                <button class="chat-toggle-btn" id="chatToggleBtn" title="Toggle chat view">💬</button>
                <button class="term-toolbar-btn" id="renameBtn">Rename</button>
                <button class="term-toolbar-btn" id="reconnectBtn">Reconnect</button>
                <button class="term-toolbar-btn" id="shutdownBtn" style="border-color:#e03e3e;color:#e03e3e;">Shutdown</button>
            </div>
            <div class="term-body">
                <div id="terminalContainer" style="display:none;"></div>
                <div class="custom-scrollbar" id="customScrollbar">
                    <div class="custom-scrollbar-track"></div>
                    <div class="custom-scrollbar-thumb" id="customScrollThumb"></div>
                </div>
            </div>
            <div class="chat-view" id="chatView">
                <div class="chat-messages" id="chatMessages"></div>
            </div>
            <div class="term-input-bar hidden" id="termInputBar">
                <textarea class="term-input-field" id="termInputField" placeholder="Type command..." rows="1" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>
                <button class="term-input-send" id="termInputSend">Send</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.min.js"></script>
    <script>
    (function () {
        const BASE = window.__VIEWER_BASE || '';
        // JUPYTER_BASE is set when served through Jupyter extension; points to Jupyter root for terminal API
        const JUPYTER = window.__JUPYTER_BASE !== undefined ? window.__JUPYTER_BASE : BASE;
        const WS_BASE = (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host;

        const termList = document.getElementById('termList');
        const termPlaceholder = document.getElementById('termPlaceholder');
        const termToolbar = document.getElementById('termToolbar');
        const terminalContainer = document.getElementById('terminalContainer');
        const termTitle = document.getElementById('termTitle');
        const statusDot = document.getElementById('statusDot');
        const newTermBtn = document.getElementById('newTermBtn');
        const backBtn = document.getElementById('backBtn');
        const reconnectBtn = document.getElementById('reconnectBtn');
        const mobileToggle = document.getElementById('mobileToggle');
        const mobileOverlay = document.getElementById('mobileOverlay');
        const termSidebar = document.getElementById('termSidebar');
        const termInputBar = document.getElementById('termInputBar');
        const termInputField = document.getElementById('termInputField');
        const termInputSend = document.getElementById('termInputSend');
        const renameBtn = document.getElementById('renameBtn');
        const shutdownBtn = document.getElementById('shutdownBtn');
        const chatToggleBtn = document.getElementById('chatToggleBtn');
        const chatView = document.getElementById('chatView');
        const chatMessages = document.getElementById('chatMessages');
        const configModalOverlay = document.getElementById('configModalOverlay');
        const configModalTitle = document.getElementById('configModalTitle');
        const configNameInput = document.getElementById('configNameInput');
        const configCmdInput = document.getElementById('configCmdInput');
        const configCancelBtn = document.getElementById('configCancelBtn');
        const configConfirmBtn = document.getElementById('configConfirmBtn');

        let currentTerm = null;
        let currentWs = null;
        let currentName = null;
        let currentDisplayName = null;
        let fitAddon = null;
        let terminalData = {};  // name -> {display_name, last_activity}
        let chatMode = false;
        let chatLog = [];  // {type: 'stdin'|'stdout', text, time}

        // Server-synced terminal config (slot-based, shared across devices)
        // Format: {slot: {display_name, command}}
        const NAMES_API = BASE + '/api/terminal-names';
        let serverSlots = {};  // {slot: {display_name, command}}

        async function fetchServerSlots() {
            try {
                const res = await fetch(NAMES_API);
                if (res.ok) serverSlots = await res.json();
            } catch (e) { /* ignore */ }
        }

        // Map terminal session names to slots by order
        function buildSlotMap(terminals) {
            const sorted = [...terminals].sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }));
            const map = {};  // termName -> slot
            sorted.forEach((t, i) => { map[t.name] = String(i + 1); });
            return map;
        }
        let slotMap = {};  // termName -> slot

        async function setServerSlot(slot, displayName, command) {
            serverSlots[slot] = { display_name: displayName, command: command || "" };
            try {
                await fetch(NAMES_API, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'X-XSRFToken': getXsrf() },
                    body: JSON.stringify({ slot, display_name: displayName, command: command || "" }),
                });
            } catch (e) { /* ignore */ }
        }
        async function removeServerSlot(slot) {
            delete serverSlots[slot];
            try {
                await fetch(NAMES_API + '?slot=' + encodeURIComponent(slot), {
                    method: 'DELETE',
                    headers: { 'X-XSRFToken': getXsrf() },
                });
            } catch (e) { /* ignore */ }
            await fetchServerSlots();
        }
        function getSlotConfig(termName) {
            const slot = slotMap[termName];
            if (slot && serverSlots[slot]) return serverSlots[slot];
            return null;
        }
        function getDisplayName(t) {
            const cfg = getSlotConfig(t.name);
            if (cfg && cfg.display_name) return cfg.display_name;
            return t.display_name || ('Terminal ' + t.name);
        }

        // XSRF token (needed for Jupyter)
        function getXsrf() {
            if (window.__XSRF_TOKEN) return window.__XSRF_TOKEN;
            const m = document.cookie.match(/(?:^|;\s*)_xsrf=([^;]*)/);
            return m ? decodeURIComponent(m[1]) : '';
        }

        // Mobile sidebar
        function openSidebar() {
            termSidebar.classList.add('open');
            mobileOverlay.classList.add('active');
        }
        function closeSidebar() {
            termSidebar.classList.remove('open');
            mobileOverlay.classList.remove('active');
        }
        mobileToggle.addEventListener('click', () => {
            termSidebar.classList.contains('open') ? closeSidebar() : openSidebar();
        });
        mobileOverlay.addEventListener('click', closeSidebar);

        // Back button
        backBtn.addEventListener('click', () => {
            window.location.href = BASE || '/';
        });

        // Load terminal list
        let lastRenderKey = '';  // cache to skip unnecessary re-renders

        async function loadTerminals() {
            try {
                const res = await fetch(JUPYTER + '/api/terminals');
                if (!res.ok) throw new Error('Failed');
                const data = await res.json();
                terminalData = {};
                data.forEach(t => { terminalData[t.name] = t; });
                await fetchServerSlots();
                slotMap = buildSlotMap(data);
                // Skip re-render if neither terminal list nor slot config changed
                const renderKey = JSON.stringify(data.map(t => t.name).sort()) + JSON.stringify(serverSlots);
                if (renderKey === lastRenderKey) return;
                lastRenderKey = renderKey;
                renderList(data);
            } catch (e) {
                termList.innerHTML = '<div class="term-empty">Error loading terminals</div>';
            }
        }

        function renderList(terminals) {
            if (terminals.length === 0) {
                termList.innerHTML = '<div class="term-empty">No active terminals.<br>Click <strong>+</strong> to create one.</div>';
                return;
            }
            termList.innerHTML = '';
            terminals.sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }));
            terminals.forEach(t => {
                const item = document.createElement('div');
                item.className = 'term-item' + (t.name === currentName ? ' active' : '');
                item.dataset.name = t.name;
                const ago = timeAgo(t.last_activity);
                const displayName = getDisplayName(t);
                item.innerHTML = `
                    <span class="term-item-icon">
                        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M2.146 3.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708l-3 3a.5.5 0 0 1-.708-.708L4.793 6.5 2.146 3.854a.5.5 0 0 1 0-.708zM6 10h4a.5.5 0 0 1 0 1H6a.5.5 0 0 1 0-1z"/></svg>
                    </span>
                    <span class="term-item-name">${esc(displayName)}</span>
                    <span class="term-item-time">${ago}</span>
                    <button class="term-item-close" title="Shutdown terminal">&times;</button>
                `;
                // Click to connect
                item.addEventListener('click', (e) => {
                    if (e.target.closest('.term-item-close')) return;
                    if (e.target.closest('.term-item-name')?.isContentEditable) return;
                    connectTerminal(t.name);
                    closeSidebar();
                });
                // Double-click name to rename
                const nameEl = item.querySelector('.term-item-name');
                nameEl.addEventListener('dblclick', (e) => {
                    e.stopPropagation();
                    startRename(nameEl, t.name);
                });
                // Close button
                item.querySelector('.term-item-close').addEventListener('click', async (e) => {
                    e.stopPropagation();
                    await deleteTerminal(t.name);
                });
                termList.appendChild(item);
            });
        }

        function startRename(nameEl, termName) {
            showConfigModal(termName);
        }

        // --- Config Modal ---
        let modalResolve = null;
        let modalMode = 'create'; // 'create' or 'rename'

        function showConfigModal(termName) {
            const isRename = !!termName;
            modalMode = isRename ? 'rename' : 'create';
            configModalTitle.textContent = isRename ? 'Rename Terminal' : 'New Terminal';
            configConfirmBtn.textContent = isRename ? 'Save' : 'Create';

            if (isRename) {
                const cfg = getSlotConfig(termName) || {};
                const currentDisplay = cfg.display_name || getDisplayName(terminalData[termName] || {name: termName});
                const currentCmd = cfg.command || "";
                configNameInput.value = currentDisplay;
                configCmdInput.value = currentCmd;
            } else {
                configNameInput.value = '';
                configCmdInput.value = '';
            }

            configModalOverlay.classList.add('active');
            configNameInput.focus();

            return new Promise(resolve => { modalResolve = resolve; });
        }

        function closeConfigModal(result) {
            configModalOverlay.classList.remove('active');
            if (modalResolve) {
                modalResolve(result);
                modalResolve = null;
            }
        }

        configCancelBtn.addEventListener('click', () => closeConfigModal(null));
        configModalOverlay.addEventListener('click', (e) => {
            if (e.target === configModalOverlay) closeConfigModal(null);
        });
        configConfirmBtn.addEventListener('click', () => {
            closeConfigModal({
                name: configNameInput.value.trim(),
                command: configCmdInput.value,
            });
        });
        configNameInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                configConfirmBtn.click();
            }
            if (e.key === 'Escape') closeConfigModal(null);
        });
        configCmdInput.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeConfigModal(null);
        });

        async function renameTerminal(name, displayName, command) {
            const slot = slotMap[name];
            if (!slot) return;
            await setServerSlot(slot, displayName, command);
            // Try API rename too (works with standalone server)
            try {
                await fetch(JUPYTER + '/api/terminals/' + name, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-XSRFToken': getXsrf(),
                    },
                    body: JSON.stringify({ display_name: displayName }),
                });
            } catch (e) { /* Jupyter doesn't support PATCH, that's ok */ }
            // Update toolbar if this is the active terminal
            if (name === currentName) {
                currentDisplayName = displayName;
                termTitle.textContent = displayName;
            }
            await loadTerminals();
        }

        function timeAgo(isoStr) {
            const diff = (Date.now() - new Date(isoStr).getTime()) / 1000;
            if (diff < 60) return 'now';
            if (diff < 3600) return Math.floor(diff / 60) + 'm';
            if (diff < 86400) return Math.floor(diff / 3600) + 'h';
            return Math.floor(diff / 86400) + 'd';
        }

        function esc(text) {
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }

        // Send multiline commands with 3s interval via WebSocket
        function sendMultilineCommand(ws, commandText) {
            if (!commandText || !commandText.trim()) return;
            const lines = commandText.split('\n').filter(l => l.trim());
            lines.forEach((line, i) => {
                setTimeout(() => {
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify(["stdin", line + "\r"]));
                    }
                }, i * 3000);
            });
        }

        // Create new terminal
        newTermBtn.addEventListener('click', async () => {
            const result = await showConfigModal(null);
            if (result === null) return;  // cancelled

            try {
                const xsrf = getXsrf();
                const res = await fetch(JUPYTER + '/api/terminals', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-XSRFToken': xsrf,
                    },
                    credentials: 'same-origin',
                });
                if (!res.ok) {
                    const body = await res.text().catch(() => '');
                    throw new Error(res.status + ' ' + body);
                }
                const data = await res.json();
                await loadTerminals();

                // If name given, save to config (persistent terminal)
                const isPersistent = !!result.name;
                if (isPersistent) {
                    // Rebuild slot map with the new terminal included
                    slotMap = buildSlotMap(Object.values(terminalData));
                    const slot = slotMap[data.name];
                    if (slot) {
                        await setServerSlot(slot, result.name, result.command);
                    }
                }
                // No name → temporary terminal (not saved, disappears on restart)

                connectTerminal(data.name);
                closeSidebar();

                // Execute startup command via WebSocket after connection
                if (result.command && result.command.trim()) {
                    // Wait for WS to open then send commands
                    const waitAndSend = () => {
                        if (currentWs && currentWs.readyState === WebSocket.OPEN) {
                            setTimeout(() => sendMultilineCommand(currentWs, result.command), 500);
                        } else {
                            setTimeout(waitAndSend, 200);
                        }
                    };
                    waitAndSend();
                }
            } catch (e) {
                alert('Failed to create terminal: ' + e.message);
            }
        });

        // Delete terminal
        async function deleteTerminal(name) {
            try {
                await fetch(JUPYTER + '/api/terminals/' + name, {
                    method: 'DELETE',
                    headers: { 'X-XSRFToken': getXsrf() },
                });
                const slot = slotMap[name];
                if (slot) await removeServerSlot(slot);
                if (name === currentName) {
                    disconnect();
                    currentName = null;
                    currentDisplayName = null;
                    termPlaceholder.style.display = '';
                    termToolbar.style.display = 'none';
                    terminalContainer.style.display = 'none';
                    termInputBar.classList.add('hidden');
                    scrollbar.classList.remove('active');
                }
                await loadTerminals();
            } catch (e) {
                alert('Failed to delete terminal');
            }
        }

        // Connect to terminal
        function connectTerminal(name) {
            disconnect();
            currentName = name;
            currentDisplayName = getDisplayName(terminalData[name] || {name: name});

            // Reset chat mode
            chatMode = false;
            chatToggleBtn.classList.remove('active');
            chatView.classList.remove('active');
            chatMessages.innerHTML = '';
            chatLog = [];
            stdoutBuffer = '';
            if (stdoutTimer) { clearTimeout(stdoutTimer); stdoutTimer = null; }

            termPlaceholder.style.display = 'none';
            termToolbar.style.display = '';
            terminalContainer.style.display = '';
            document.querySelector('.term-body').style.display = '';
            termInputBar.classList.remove('hidden');
            scrollbar.classList.add('active');
            termTitle.textContent = currentDisplayName;

            // Mark active in list
            document.querySelectorAll('.term-item').forEach(el => {
                el.classList.toggle('active', el.dataset.name === name);
            });

            // Create xterm
            terminalContainer.innerHTML = '';

            // === Scroll lock: intercept scrollTop at the property level ===
            // xterm.js sets viewport.scrollTop programmatically during write().
            // We override the property so that when user has scrolled up,
            // ALL programmatic scrollTop changes are silently ignored.
            let followMode = true;  // true = auto-scroll to bottom

            currentTerm = new Terminal({
                cursorBlink: true,
                fontSize: 14,
                fontFamily: "'SFMono-Regular', 'Fira Code', 'Consolas', 'Courier New', monospace",
                theme: {
                    background: '#1e1e1e',
                    foreground: '#d4d4d4',
                    cursor: '#d4d4d4',
                    selectionBackground: '#264f78',
                    black: '#1e1e1e',
                    red: '#f44747',
                    green: '#6a9955',
                    yellow: '#d7ba7d',
                    blue: '#569cd6',
                    magenta: '#c586c0',
                    cyan: '#4ec9b0',
                    white: '#d4d4d4',
                },
                scrollback: 10000,
                smoothScrollDuration: 0,
                allowProposedApi: true,
            });

            fitAddon = new FitAddon.FitAddon();
            const webLinksAddon = new WebLinksAddon.WebLinksAddon();
            currentTerm.loadAddon(fitAddon);
            currentTerm.loadAddon(webLinksAddon);
            currentTerm.open(terminalContainer);

            setTimeout(() => {
                fitAddon.fit();
                const viewport = terminalContainer.querySelector('.xterm-viewport');
                if (viewport) {
                    // Prevent browser auto-scroll-anchoring
                    viewport.style.overflowAnchor = 'none';

                    // Save native scroll methods before overriding
                    const proto = Object.getPrototypeOf(viewport);
                    const desc = Object.getOwnPropertyDescriptor(proto, 'scrollTop')
                              || Object.getOwnPropertyDescriptor(Element.prototype, 'scrollTop');
                    const nativeSet = desc.set;
                    const nativeGet = desc.get;
                    const nativeScrollTo = viewport.scrollTo.bind(viewport);
                    const nativeScroll = viewport.scroll.bind(viewport);
                    const nativeScrollBy = viewport.scrollBy.bind(viewport);

                    // Block scrollTop setter when locked
                    Object.defineProperty(viewport, 'scrollTop', {
                        get() { return nativeGet.call(this); },
                        set(val) {
                            if (!followMode) return;  // block
                            nativeSet.call(this, val);
                        },
                        configurable: true,
                    });

                    // Block scrollTo/scroll/scrollBy when locked
                    viewport.scrollTo = function(...args) {
                        if (!followMode) return;
                        nativeScrollTo(...args);
                    };
                    viewport.scroll = function(...args) {
                        if (!followMode) return;
                        nativeScrollTo(...args);
                    };
                    viewport.scrollBy = function(...args) {
                        if (!followMode) return;
                        nativeScrollBy(...args);
                    };

                    // User scroll: wheel/touch
                    let scrollTimeout = null;
                    viewport.addEventListener('wheel', (e) => {
                        const current = nativeGet.call(viewport);
                        // Scrolling up → immediately lock
                        if (e.deltaY < 0) {
                            followMode = false;
                        }
                        // Apply wheel delta manually (works in both modes)
                        nativeSet.call(viewport, current - e.deltaY * (e.deltaMode === 1 ? 20 : 1));
                        // After scrolling stops, check if back at bottom
                        clearTimeout(scrollTimeout);
                        scrollTimeout = setTimeout(() => {
                            const atBottom = viewport.scrollHeight - nativeGet.call(viewport) - viewport.clientHeight < 30;
                            followMode = atBottom;
                            updateScrollbar();
                        }, 150);
                    }, { passive: true });

                    viewport.addEventListener('scroll', () => { updateScrollbar(); });

                    // Initial: scroll to bottom
                    followMode = true;
                    nativeSet.call(viewport, viewport.scrollHeight);
                    updateScrollbar();
                }
            }, 50);

            // WebSocket
            const wsUrl = WS_BASE + JUPYTER + '/terminals/websocket/' + name;
            currentWs = new WebSocket(wsUrl);

            currentWs.onopen = () => {
                statusDot.classList.remove('disconnected');
                const dims = fitAddon.proposeDimensions();
                if (dims) {
                    currentWs.send(JSON.stringify(["set_size", dims.rows, dims.cols]));
                }
            };

            currentWs.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    if (msg[0] === 'stdout') {
                        currentTerm.write(msg[1]);
                        bufferStdout(msg[1]);
                    } else if (msg[0] === 'disconnect') {
                        statusDot.classList.add('disconnected');
                    }
                } catch (e) {}
            };

            currentWs.onclose = () => {
                statusDot.classList.add('disconnected');
            };

            currentWs.onerror = () => {
                statusDot.classList.add('disconnected');
            };

            // Send input character by character
            currentTerm.onData((data) => {
                if (currentWs && currentWs.readyState === WebSocket.OPEN) {
                    currentWs.send(JSON.stringify(["stdin", data]));
                }
            });

            // Handle resize (debounced to prevent scroll thrashing)
            let resizeTimer = null;
            const resizeObserver = new ResizeObserver(() => {
                if (resizeTimer) clearTimeout(resizeTimer);
                resizeTimer = setTimeout(() => {
                    if (fitAddon && currentTerm) {
                        const viewport = terminalContainer.querySelector('.xterm-viewport');
                        const savedTop = viewport ? viewport.scrollTop : 0;
                        const wasAtBottom = viewport
                            ? viewport.scrollHeight - viewport.scrollTop - viewport.clientHeight < 30
                            : true;
                        fitAddon.fit();
                        // Restore scroll after fit recalculates viewport
                        if (viewport) {
                            requestAnimationFrame(() => {
                                if (wasAtBottom) {
                                    viewport.scrollTop = viewport.scrollHeight;
                                } else {
                                    viewport.scrollTop = savedTop;
                                }
                                updateScrollbar();
                            });
                        }
                        if (currentWs && currentWs.readyState === WebSocket.OPEN) {
                            const dims = fitAddon.proposeDimensions();
                            if (dims) {
                                currentWs.send(JSON.stringify(["set_size", dims.rows, dims.cols]));
                            }
                        }
                    }
                }, 100);
            });
            resizeObserver.observe(terminalContainer);
        }

        function disconnect() {
            if (currentWs) {
                currentWs.close();
                currentWs = null;
            }
            if (currentTerm) {
                currentTerm.dispose();
                currentTerm = null;
            }
            fitAddon = null;
        }

        // Reconnect button
        reconnectBtn.addEventListener('click', () => {
            if (currentName) connectTerminal(currentName);
        });

        // Shutdown button in toolbar
        shutdownBtn.addEventListener('click', () => {
            if (!currentName) return;
            if (confirm('Shutdown Terminal ' + currentName + '?')) {
                deleteTerminal(currentName);
            }
        });

        // Rename button in toolbar
        renameBtn.addEventListener('click', async () => {
            if (!currentName) return;
            const result = await showConfigModal(currentName);
            if (result === null) return;
            const finalName = result.name || currentDisplayName;
            await renameTerminal(currentName, finalName, result.command);
        });

        // Input bar
        // Enter = newline (default textarea), Send button = execute
        function sendInput() {
            const text = termInputField.value;
            if (!text || !currentWs || currentWs.readyState !== WebSocket.OPEN) return;
            // Add to chat view
            addChatBubble('stdin', text);
            // Send text first, then \r after a short delay
            // This works with raw-mode programs (Claude CLI, vim, etc.)
            currentWs.send(JSON.stringify(["stdin", text]));
            setTimeout(() => {
                if (currentWs && currentWs.readyState === WebSocket.OPEN) {
                    currentWs.send(JSON.stringify(["stdin", "\r"]));
                }
            }, 50);
            termInputField.value = '';
            autoResizeInput();
        }
        function autoResizeInput() {
            termInputField.style.height = 'auto';
            termInputField.style.height = Math.min(termInputField.scrollHeight, 120) + 'px';
        }
        termInputField.addEventListener('input', autoResizeInput);
        termInputSend.addEventListener('click', sendInput);
        termInputField.addEventListener('keydown', (e) => {
            // Enter = newline (default), no preventDefault
            if (e.key === 'Tab') {
                e.preventDefault();
                if (currentWs && currentWs.readyState === WebSocket.OPEN) {
                    currentWs.send(JSON.stringify(["stdin", "\t"]));
                }
            }
            if (e.key === 'c' && e.ctrlKey) {
                const hasSelection = termInputField.selectionStart !== termInputField.selectionEnd;
                if (hasSelection) {
                    // Allow default copy behavior
                    return;
                }
                // No selection: clear input field only, do NOT send interrupt to terminal
                e.preventDefault();
                termInputField.value = '';
                autoResizeInput();
            }
        });

        // === Chat (iMessage) toggle ===
        chatToggleBtn.addEventListener('click', () => {
            chatMode = !chatMode;
            chatToggleBtn.classList.toggle('active', chatMode);
            const termBody = document.querySelector('.term-body');
            if (chatMode) {
                termBody.style.display = 'none';
                chatView.classList.add('active');
                scrollChatToBottom();
            } else {
                termBody.style.display = '';
                chatView.classList.remove('active');
                if (fitAddon) setTimeout(() => fitAddon.fit(), 50);
            }
        });

        function addChatBubble(type, text) {
            if (!text || !text.trim()) return;
            const bubble = document.createElement('div');
            bubble.className = 'chat-bubble ' + type;
            bubble.textContent = text;
            const timeEl = document.createElement('span');
            timeEl.className = 'chat-time';
            const now = new Date();
            timeEl.textContent = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
            bubble.appendChild(timeEl);
            chatMessages.appendChild(bubble);
            chatLog.push({type, text, time: Date.now()});
            scrollChatToBottom();
        }

        function scrollChatToBottom() {
            requestAnimationFrame(() => {
                chatMessages.scrollTop = chatMessages.scrollHeight;
            });
        }

        // === Terminal output → chat text conversion ===
        // Strips ANSI escape codes and emulates carriage return line overwriting
        function cleanTerminalOutput(raw) {
            // 1. Strip all ANSI escape sequences
            let text = raw
                // CSI sequences: ESC [ ... <letter>  (colors, cursor moves, erase, etc.)
                .replace(/\x1b\[[0-9;?]*[a-zA-Z]/g, '')
                // OSC sequences: ESC ] ... BEL or ESC ] ... ST
                .replace(/\x1b\][^\x07\x1b]*(?:\x07|\x1b\\)/g, '')
                // ESC ( / ESC ) charset selects
                .replace(/\x1b[()][0-9A-B]/g, '')
                // Other 2-byte ESC sequences (ESC =, ESC >, etc.)
                .replace(/\x1b[^[\]()]/g, '')
                // Stray ESC
                .replace(/\x1b/g, '')
                // BEL
                .replace(/\x07/g, '')
                // Backspace character
                .replace(/\x08/g, '');

            // 2. Emulate carriage return (\r) — overwrites from start of line
            //    Split by \n first, then handle \r within each line
            const lines = text.split('\n');
            const processed = [];
            for (let line of lines) {
                if (line.includes('\r')) {
                    // Each \r resets write position to start of line
                    const parts = line.split('\r');
                    let result = '';
                    for (const part of parts) {
                        if (part === '') continue;
                        // Overwrite: part overwrites from position 0
                        const chars = result.split('');
                        for (let i = 0; i < part.length; i++) {
                            chars[i] = part[i];
                        }
                        result = chars.join('');
                    }
                    processed.push(result);
                } else {
                    processed.push(line);
                }
            }

            // 3. Collapse runs of 3+ empty lines into 2
            let result = '';
            let emptyCount = 0;
            for (const line of processed) {
                if (line.trim() === '') {
                    emptyCount++;
                    if (emptyCount <= 2) result += '\n';
                } else {
                    emptyCount = 0;
                    if (result.length > 0 && !result.endsWith('\n')) result += '\n';
                    result += line;
                }
            }

            return result.trim();
        }

        // Batch stdout for chat: collect output for 500ms before creating a bubble
        let stdoutBuffer = '';
        let stdoutTimer = null;
        function bufferStdout(data) {
            stdoutBuffer += data;
            if (stdoutTimer) clearTimeout(stdoutTimer);
            stdoutTimer = setTimeout(() => {
                if (stdoutBuffer.trim()) {
                    const clean = cleanTerminalOutput(stdoutBuffer);
                    if (clean) addChatBubble('stdout', clean);
                }
                stdoutBuffer = '';
                stdoutTimer = null;
            }, 500);
        }

        // === Custom scrollbar ===
        const scrollbar = document.getElementById('customScrollbar');
        const scrollThumb = document.getElementById('customScrollThumb');
        let scrollDragging = false;
        let scrollDragStartY = 0;
        let scrollDragStartTop = 0;

        function updateScrollbar() {
            const viewport = terminalContainer.querySelector('.xterm-viewport');
            if (!viewport) return;
            const { scrollHeight, clientHeight, scrollTop } = viewport;
            const trackH = scrollbar.clientHeight - 8;
            if (trackH <= 0) return;
            if (scrollHeight <= clientHeight) {
                scrollThumb.style.height = trackH + 'px';
                scrollThumb.style.top = '4px';
                scrollThumb.style.opacity = '0.3';
                return;
            }
            scrollThumb.style.opacity = '1';
            const thumbH = Math.max(40, (clientHeight / scrollHeight) * trackH);
            const maxThumbTop = trackH - thumbH;
            const thumbTop = 4 + (scrollTop / (scrollHeight - clientHeight)) * maxThumbTop;
            scrollThumb.style.height = thumbH + 'px';
            scrollThumb.style.top = thumbTop + 'px';
        }

        // Drag support (mouse + touch)
        function onDragStart(e) {
            e.preventDefault();
            scrollDragging = true;
            scrollThumb.classList.add('dragging');
            const y = e.touches ? e.touches[0].clientY : e.clientY;
            scrollDragStartY = y;
            scrollDragStartTop = parseFloat(scrollThumb.style.top) || 0;
        }
        function onDragMove(e) {
            if (!scrollDragging) return;
            e.preventDefault();
            const y = e.touches ? e.touches[0].clientY : e.clientY;
            const delta = y - scrollDragStartY;
            const viewport = terminalContainer.querySelector('.xterm-viewport');
            if (!viewport) return;
            const trackH = scrollbar.clientHeight - 8;
            const thumbH = scrollThumb.clientHeight;
            const maxThumbTop = trackH - thumbH;
            const rawTop = scrollDragStartTop + delta - 4;
            const newTop = Math.max(0, Math.min(maxThumbTop, rawTop));
            const scrollRatio = maxThumbTop > 0 ? newTop / maxThumbTop : 0;
            viewport.scrollTop = scrollRatio * (viewport.scrollHeight - viewport.clientHeight);
        }
        function onDragEnd() {
            scrollDragging = false;
            scrollThumb.classList.remove('dragging');
        }
        scrollThumb.addEventListener('mousedown', onDragStart);
        scrollThumb.addEventListener('touchstart', onDragStart, { passive: false });
        document.addEventListener('mousemove', onDragMove);
        document.addEventListener('touchmove', onDragMove, { passive: false });
        document.addEventListener('mouseup', onDragEnd);
        document.addEventListener('touchend', onDragEnd);

        // Click on track to jump
        scrollbar.addEventListener('click', (e) => {
            if (e.target === scrollThumb) return;
            const viewport = terminalContainer.querySelector('.xterm-viewport');
            if (!viewport) return;
            const rect = scrollbar.getBoundingClientRect();
            const clickRatio = (e.clientY - rect.top) / rect.height;
            viewport.scrollTop = clickRatio * (viewport.scrollHeight - viewport.clientHeight);
        });

        // Update scrollbar on scroll and content changes
        setInterval(updateScrollbar, 200);

        // Init
        loadTerminals();
        setInterval(loadTerminals, 10000);
