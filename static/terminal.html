<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=overlays-content">
    <title>Terminal - Claude Notebook</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
    <link rel="stylesheet" href="terminal.css">
</head>
<body>
    <!-- Config Modal -->
    <div class="config-modal-overlay" id="configModalOverlay">
        <div class="config-modal">
            <h3 id="configModalTitle">New Terminal</h3>
            <div class="field-group">
                <label for="configNameInput">Terminal Name</label>
                <input type="text" id="configNameInput" placeholder="Leave empty for temporary terminal">
            </div>
            <div class="field-group">
                <label for="configCmdInput">Startup Command</label>
                <textarea id="configCmdInput" rows="3" placeholder="Enter commands (one per line, 3s interval)"></textarea>
                <div class="field-hint">Each line runs as a separate command with 3 second intervals.</div>
            </div>
            <div class="field-group field-group-checkbox">
                <label class="checkbox-label">
                    <input type="checkbox" id="configChatMode">
                    <span>Chat Mode</span>
                </label>
            </div>
            <div class="config-modal-actions">
                <button class="modal-btn-cancel" id="configCancelBtn">Cancel</button>
                <button class="modal-btn-confirm" id="configConfirmBtn">Create</button>
            </div>
        </div>
    </div>

    <div class="layout">
        <button class="mobile-toggle" id="mobileToggle">&#9776;</button>
        <div class="mobile-overlay" id="mobileOverlay"></div>

        <aside class="term-sidebar" id="termSidebar">
            <div class="term-sidebar-header">
                <h2>Terminals</h2>
                <div class="header-actions">
                    <button class="btn-icon new-btn" id="newTermBtn" title="New Terminal">+</button>
                    <button class="btn-icon back-btn" id="backBtn" title="Files">
                        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M.54 3.87L.5 3a2 2 0 0 1 2-2h3.672a2 2 0 0 1 1.414.586l.828.828A2 2 0 0 0 9.828 3H13.5a2 2 0 0 1 2 2v1H8.032a3 3 0 0 0-2.83 2L4.5 10.236V3.87zM0 13.5V5.864l.197-.98A1 1 0 0 1 1.178 4h12.644a1 1 0 0 1 .981 1.185l-1.286 6A1 1 0 0 1 12.536 12H1.977a1 1 0 0 1-.98-.82L0 6.5v7a.5.5 0 0 0 .5.5h13a.5.5 0 0 0 .5-.5v-1h1v1a1.5 1.5 0 0 1-1.5 1.5h-13A1.5 1.5 0 0 1 0 13.5z"/></svg>
                    </button>
                </div>
            </div>
            <div class="term-list" id="termList">
                <div class="term-empty">Loading terminals...</div>
            </div>
        </aside>

        <div class="term-main" id="termMain">
            <div class="term-placeholder" id="termPlaceholder">
                Select a terminal from the sidebar<br>or create a new one with +
            </div>
            <div class="term-toolbar" id="termToolbar" style="display:none;">
                <div class="term-toolbar-dot" id="statusDot"></div>
                <span class="term-toolbar-title" id="termTitle"></span>
                <div class="term-toolbar-spacer"></div>
                <button class="term-toolbar-btn" id="selectToggleBtn" title="Toggle select mode"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M5 3.5h6A1.5 1.5 0 0 1 12.5 5v6a1.5 1.5 0 0 1-1.5 1.5H5A1.5 1.5 0 0 1 3.5 11V5A1.5 1.5 0 0 1 5 3.5zM11 4H5a1 1 0 0 0-1 1v6a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V5a1 1 0 0 0-1-1z"/><path d="M3.64 1.04a.5.5 0 0 1 .32.92L2.5 2.5v1a.5.5 0 0 1-1 0v-1a1.5 1.5 0 0 1 .6-1.2l1.04-.76zM1.5 5.5a.5.5 0 0 1 1 0v1a.5.5 0 0 1-1 0v-1zm0 4a.5.5 0 0 1 1 0v1a.5.5 0 0 1-1 0v-1zm.6 4.2a1.5 1.5 0 0 1-.6-1.2v-1a.5.5 0 0 1 1 0v1l1.46.54a.5.5 0 1 1-.32.92L2.1 13.7zM5.5 14.5a.5.5 0 0 1 0-1h1a.5.5 0 0 1 0 1h-1zm4 0a.5.5 0 0 1 0-1h1a.5.5 0 0 1 0 1h-1zm3.9-.8l-1.04.76a.5.5 0 1 1-.32-.92L13.5 13v-1a.5.5 0 0 1 1 0v1a1.5 1.5 0 0 1-.6 1.2zM14.5 10.5a.5.5 0 0 1-1 0v-1a.5.5 0 0 1 1 0v1zm0-4a.5.5 0 0 1-1 0v-1a.5.5 0 0 1 1 0v1zm-.6-4.2a1.5 1.5 0 0 1 .6 1.2v1a.5.5 0 0 1-1 0v-1l-1.46-.54a.5.5 0 1 1 .32-.92l1.04.76zM10.5 1.5a.5.5 0 0 1 0 1h-1a.5.5 0 0 1 0-1h1zm-4 0a.5.5 0 0 1 0 1h-1a.5.5 0 0 1 0-1h1z"/></svg></button>
                <button class="chat-toggle-btn" id="chatToggleBtn" title="Toggle chat view"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M2.5 1A1.5 1.5 0 0 0 1 2.5v9A1.5 1.5 0 0 0 2.5 13h1.09l2.35 1.96a.5.5 0 0 0 .64 0L8.93 13h4.57A1.5 1.5 0 0 0 15 11.5v-9A1.5 1.5 0 0 0 13.5 1h-11zM4 5.5a.5.5 0 0 1 .5-.5h7a.5.5 0 0 1 0 1h-7a.5.5 0 0 1-.5-.5zm0 3a.5.5 0 0 1 .5-.5h4a.5.5 0 0 1 0 1h-4a.5.5 0 0 1-.5-.5z"/></svg></button>
                <button class="term-toolbar-btn" id="renameBtn" title="Config"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 4.754a3.246 3.246 0 1 0 0 6.492 3.246 3.246 0 0 0 0-6.492zM5.754 8a2.246 2.246 0 1 1 4.492 0 2.246 2.246 0 0 1-4.492 0z"/><path d="M9.796 1.343c-.527-1.79-3.065-1.79-3.592 0l-.094.319a.873.873 0 0 1-1.255.52l-.292-.16c-1.64-.892-3.433.902-2.54 2.541l.159.292a.873.873 0 0 1-.52 1.255l-.319.094c-1.79.527-1.79 3.065 0 3.592l.319.094a.873.873 0 0 1 .52 1.255l-.16.292c-.892 1.64.901 3.434 2.541 2.54l.292-.159a.873.873 0 0 1 1.255.52l.094.319c.527 1.79 3.065 1.79 3.592 0l.094-.319a.873.873 0 0 1 1.255-.52l.292.16c1.64.893 3.434-.902 2.54-2.541l-.159-.292a.873.873 0 0 1 .52-1.255l.319-.094c1.79-.527 1.79-3.065 0-3.592l-.319-.094a.873.873 0 0 1-.52-1.255l.16-.292c.893-1.64-.902-3.433-2.541-2.54l-.292.159a.873.873 0 0 1-1.255-.52l-.094-.319zm-2.633.283c.246-.835 1.428-.835 1.674 0l.094.319a1.873 1.873 0 0 0 2.693 1.115l.291-.16c.764-.415 1.6.42 1.184 1.185l-.159.292a1.873 1.873 0 0 0 1.116 2.692l.318.094c.835.246.835 1.428 0 1.674l-.319.094a1.873 1.873 0 0 0-1.115 2.693l.16.291c.415.764-.421 1.6-1.185 1.184l-.291-.159a1.873 1.873 0 0 0-2.693 1.116l-.094.318c-.246.835-1.428.835-1.674 0l-.094-.319a1.873 1.873 0 0 0-2.692-1.115l-.292.16c-.764.415-1.6-.421-1.184-1.185l.159-.291A1.873 1.873 0 0 0 1.945 8.93l-.319-.094c-.835-.246-.835-1.428 0-1.674l.319-.094A1.873 1.873 0 0 0 3.06 4.377l-.16-.292c-.415-.764.42-1.6 1.185-1.184l.292.159a1.873 1.873 0 0 0 2.692-1.115l.094-.319z"/></svg></button>
                <button class="term-toolbar-btn" id="reconnectBtn" title="Reconnect"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M11.534 7h3.932a.25.25 0 0 1 .192.41l-1.966 2.36a.25.25 0 0 1-.384 0l-1.966-2.36a.25.25 0 0 1 .192-.41zm-11 2h3.932a.25.25 0 0 0 .192-.41L2.692 6.23a.25.25 0 0 0-.384 0L.342 8.59A.25.25 0 0 0 .534 9z"/><path d="M8 3c-1.552 0-2.94.707-3.857 1.818a.5.5 0 1 1-.771-.636A5.501 5.501 0 0 1 13.5 8a.5.5 0 0 1-1 0A4.5 4.5 0 0 0 8 3zM3.5 8a.5.5 0 0 1 1 0 4.5 4.5 0 0 0 7.857 2.818.5.5 0 1 1 .771.636A5.501 5.501 0 0 1 2.5 8z"/></svg></button>
                <button class="term-toolbar-btn" id="shutdownBtn" title="Shutdown" style="border-color:var(--danger);color:var(--danger);"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z"/><path d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1zM4.118 4L4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118zM2.5 3V2h11v1h-11z"/></svg></button>
            </div>
            <div class="term-body">
                <div id="terminalContainer" style="display:none;"></div>
                <div class="term-select-overlay" id="termSelectOverlay">
                    <pre class="term-select-text" id="termSelectText"></pre>
                </div>
                <div class="custom-scrollbar" id="customScrollbar">
                    <div class="custom-scrollbar-track"></div>
                    <div class="custom-scrollbar-thumb" id="customScrollThumb"></div>
                </div>
            </div>
            <!-- iMessage chat view — inside term-main, above input bar -->
            <div class="chat-view" id="chatView">
                <div class="chat-messages" id="chatMessages"></div>
            </div>
            <!-- Virtual Keyboard Panel (mobile only) -->
            <div class="vkb-panel" id="vkbPanel">
                <div class="vkb-row">
                    <button class="vkb-key" data-key="Escape">Esc</button>
                    <button class="vkb-key vkb-fn" data-key="F1">F1</button>
                    <button class="vkb-key vkb-fn" data-key="F2">F2</button>
                    <button class="vkb-key vkb-fn" data-key="F3">F3</button>
                    <button class="vkb-key vkb-fn" data-key="F4">F4</button>
                    <button class="vkb-key vkb-fn" data-key="F5">F5</button>
                    <button class="vkb-key vkb-fn" data-key="F6">F6</button>
                    <button class="vkb-key vkb-fn" data-key="F7">F7</button>
                    <button class="vkb-key vkb-fn" data-key="F8">F8</button>
                    <button class="vkb-key vkb-fn" data-key="F9">F9</button>
                    <button class="vkb-key vkb-fn" data-key="F10">F10</button>
                    <button class="vkb-key vkb-fn" data-key="F11">F11</button>
                    <button class="vkb-key vkb-fn" data-key="F12">F12</button>
                </div>
                <div class="vkb-row">
                    <button class="vkb-key vkb-mod" data-mod="ctrl">Ctrl</button>
                    <button class="vkb-key vkb-mod" data-mod="alt">Alt</button>
                    <button class="vkb-key vkb-mod" data-mod="shift">Shift</button>
                    <button class="vkb-key vkb-mod" data-mod="meta">Meta</button>
                    <button class="vkb-key" data-key="Tab">Tab</button>
                    <button class="vkb-key" data-key="Enter">Enter</button>
                    <button class="vkb-key" data-key="Backspace">Bksp</button>
                    <button class="vkb-key" data-key="Delete">Del</button>
                </div>
                <div class="vkb-row">
                    <button class="vkb-key" data-key="Insert">Ins</button>
                    <button class="vkb-key" data-key="Home">Home</button>
                    <button class="vkb-key" data-key="End">End</button>
                    <button class="vkb-key" data-key="PageUp">PgUp</button>
                    <button class="vkb-key" data-key="PageDown">PgDn</button>
                    <button class="vkb-key vkb-arrow" data-key="ArrowUp">&uarr;</button>
                    <button class="vkb-key vkb-arrow" data-key="ArrowDown">&darr;</button>
                    <button class="vkb-key vkb-arrow" data-key="ArrowLeft">&larr;</button>
                    <button class="vkb-key vkb-arrow" data-key="ArrowRight">&rarr;</button>
                </div>
            </div>
            <div class="term-input-bar hidden" id="termInputBar">
                <div class="input-resize-handle" id="inputResizeHandle"></div>
                <label class="term-attach-btn" title="Attach file">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
                    <input type="file" id="termFileInput" multiple hidden>
                </label>
                <button class="vkb-toggle-btn" id="vkbToggleBtn" title="Virtual keyboard">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2" ry="2"/><line x1="6" y1="8" x2="6.01" y2="8"/><line x1="10" y1="8" x2="10.01" y2="8"/><line x1="14" y1="8" x2="14.01" y2="8"/><line x1="18" y1="8" x2="18.01" y2="8"/><line x1="6" y1="12" x2="6.01" y2="12"/><line x1="10" y1="12" x2="10.01" y2="12"/><line x1="14" y1="12" x2="14.01" y2="12"/><line x1="18" y1="12" x2="18.01" y2="12"/><line x1="8" y1="16" x2="16" y2="16"/></svg>
                </button>
                <div class="input-wrap">
                    <div class="pending-files" id="termPendingFiles"></div>
                    <textarea class="term-input-field" id="termInputField" placeholder="Type command..." rows="1" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>
                </div>
                <button class="term-input-send" id="termInputSend">Send</button>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.min.js"></script>
    <script src="terminal.js"></script>
</body>
</html>
