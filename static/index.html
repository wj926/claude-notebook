<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Claude Notebook</title>
  <script>
    (function(){var s=localStorage.getItem('cn-theme');var t=s==='dark'||s==='light'?s:(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.dataset.theme=t;})();
  </script>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="main/main.css">
  <script src="https://cdn.jsdelivr.net/npm/marked@4/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github.min.css">
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
</head>
<body>
  <header id="topbar">
    <span class="brand">Claude Notebook</span>
    <span id="ssh-slot"></span>
    <span class="spacer"></span>
    <!-- previewHelp / previewHistory: 파일 탭 열릴 때 app.js가 display 조작 -->
    <button id="previewHelp" type="button" title="Keyboard shortcuts (?)" style="display:none;">?</button>
    <button id="previewHistory" type="button" title="History" style="display:none;"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 3.5a.5.5 0 0 0-1 0V9a.5.5 0 0 0 .252.434l3.5 2a.5.5 0 0 0 .496-.868L8 8.71V3.5z"/><path d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16zm7-8A7 7 0 1 1 1 8a7 7 0 0 1 14 0z"/></svg></button>
    <button id="split-btn" type="button">&#x229F; Split</button>
    <button id="sidebarToggle" type="button" aria-label="사이드바 토글">&#9776;</button>
  </header>

  <div id="sidebarOverlay" hidden></div>

  <main id="app">
    <aside id="sidebar">
      <header class="sidebar-head">
        <button id="sidebarClose" type="button" aria-label="닫기">&times;</button>
        <button id="terminalBtn" type="button">Terminal</button>
        <button id="themeToggleBtn" type="button">Theme</button>
      </header>

      <section class="side-section" id="files-section">
        <header class="side-head">
          <span class="side-title">Files</span>
          <span class="side-badge" title="SSH host affects terminals only — files are always local">LOCAL</span>
        </header>
        <div id="tree" class="side-body"></div>
      </section>

      <section class="side-section" id="terms-section">
        <header class="side-head">
          <span class="side-title">Terminals</span>
          <button class="side-add" id="new-term-btn" type="button">+</button>
        </header>
        <ul class="term-list" id="term-list"></ul>
      </section>
    </aside>

    <div id="divider"></div>

    <section id="main"><!-- layout.js fills --></section>
  </main>

  <div id="add-host-modal" class="modal" hidden></div>

  <!-- ===== Legacy-parity modals (hidden by default) ===== -->

  <!-- Finder grid view (§5.7 보존 — 새 통합 페이지에서는 tree.js가 탐색 역할.
       finder DOM은 숨김으로 존재해 finder.js 모듈 레벨 getElementById null 방지.
       #newFileBtn / #newFolderBtn 은 file-ops.js initFileOpsButtons() 가 필요) -->
  <div id="finder" class="finder" hidden>
    <div class="finder-toolbar">
      <div class="finder-breadcrumb" id="finderBreadcrumb"><span data-path="">Workspace</span></div>
      <div class="finder-actions">
        <button class="finder-btn" id="viewToggleBtn" title="Toggle view">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" id="viewToggleIconGrid"><path d="M1 2.5A1.5 1.5 0 0 1 2.5 1h3A1.5 1.5 0 0 1 7 2.5v3A1.5 1.5 0 0 1 5.5 7h-3A1.5 1.5 0 0 1 1 5.5v-3zm8 0A1.5 1.5 0 0 1 10.5 1h3A1.5 1.5 0 0 1 15 2.5v3A1.5 1.5 0 0 1 13.5 7h-3A1.5 1.5 0 0 1 9 5.5v-3zm-8 8A1.5 1.5 0 0 1 2.5 9h3A1.5 1.5 0 0 1 7 10.5v3A1.5 1.5 0 0 1 5.5 15h-3A1.5 1.5 0 0 1 1 13.5v-3zm8 0A1.5 1.5 0 0 1 10.5 9h3A1.5 1.5 0 0 1 15 10.5v3A1.5 1.5 0 0 1 13.5 15h-3A1.5 1.5 0 0 1 9 13.5v-3z"/></svg>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" id="viewToggleIconList" style="display:none;"><path d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5z"/></svg>
        </button>
        <button class="finder-btn" id="newFileBtn" title="New file">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a.5.5 0 0 1 .5.5V6H13a.5.5 0 0 1 0 1H8.5v4.5a.5.5 0 0 1-1 0V7H3a.5.5 0 0 1 0-1h4.5V1.5A.5.5 0 0 1 8 1z"/></svg>
        </button>
        <button class="finder-btn" id="newFolderBtn" title="New folder">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M.54 3.87L.5 3a2 2 0 0 1 2-2h3.672a2 2 0 0 1 1.414.586l.828.828A2 2 0 0 0 9.828 3H13.5a2 2 0 0 1 2 2v1H1.5V3.87zM0 13.5V5.864l.197-.98A1 1 0 0 1 1.178 4h12.644a1 1 0 0 1 .981 1.185l-1.286 6A1 1 0 0 1 12.536 12H1.977a1 1 0 0 1-.98-.82L0 6.5v7a.5.5 0 0 0 .5.5h13a.5.5 0 0 0 .5-.5v-1h1v1a1.5 1.5 0 0 1-1.5 1.5h-13A1.5 1.5 0 0 1 0 13.5z"/><path d="M8 7a.5.5 0 0 1 .5.5V9H10a.5.5 0 0 1 0 1H8.5v1.5a.5.5 0 0 1-1 0V10H6a.5.5 0 0 1 0-1h1.5V7.5A.5.5 0 0 1 8 7z"/></svg>
        </button>
        <label class="finder-btn" title="Upload files">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M.5 9.9a.5.5 0 0 1 .5.5V12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-1.6a.5.5 0 0 1 1 0V12a3 3 0 0 1-3 3H3a3 3 0 0 1-3-3v-1.6a.5.5 0 0 1 .5-.5z"/><path d="M7.646 1.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1-.708.708L8.5 2.707V11.5a.5.5 0 0 1-1 0V2.707L5.354 4.854a.5.5 0 1 1-.708-.708l3-3z"/></svg>
          <input type="file" id="finderUpload" multiple hidden>
        </label>
      </div>
    </div>
    <div class="finder-grid" id="finderGrid"></div>
    <div class="finder-empty" id="finderEmpty" style="display:none;">This folder is empty</div>
  </div>

  <!-- Keyboard help overlay (keyboard-help.js) -->
  <div class="help-overlay" id="helpOverlay"></div>

  <!-- Snapshot history modal (history-modal.js) -->
  <div class="history-overlay" id="historyOverlay">
    <div class="history-modal">
      <div class="history-header">
        <h3>File History</h3>
        <button class="history-close" id="historyClose" aria-label="Close">&times;</button>
      </div>
      <div class="history-body">
        <div class="history-list" id="historyList"></div>
        <div class="history-preview" id="historyPreview">
          <div class="history-preview-empty">Select a snapshot to preview</div>
        </div>
      </div>
      <div class="history-footer">
        <button class="history-restore" id="historyRestore" disabled>Restore this version</button>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
